<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
        // Get the current path
        const path = window.location.pathname;
        // Remove /MeapLog from the path if it exists
        const cleanPath = path.replace('/MeapLog', '');
        // Redirect to the correct URL with hash
        window.location.href = '/MeapLog/#' + cleanPath;
    </script>
</head>
<body>
    <p>Redirecting...</p>
</body>
</html>
