<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
        // Get the current path
        const path = window.location.pathname;
        
        // If we're at the root path, redirect to the homepage route
        if (path === '' || path === '/') {
            window.location.href = '/#/';
        } else {
            // For other paths, redirect with hash
            window.location.href = '/#' + path;
        }
    </script>
</head>
<body>
    <p>Redirecting...</p>
</body>
</html>
